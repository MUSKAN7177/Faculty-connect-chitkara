<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Faculty Connect ERP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Poppins:wght@700&display=swap" rel="stylesheet">
    
    <link rel="manifest" href="manifest.json">
    <style>
        /* Specific Welcome Page Enhancements */
        .welcome-bg {
            background: linear-gradient(135deg, #1a2a6c 0%, #243b55 50%, #ed1c24 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Circles */
        .circle {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            z-index: 0;
        }

        .welcome-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            z-index: 1;
            max-width: 500px;
            width: 90%;
            text-align: center;
            border-top: 6px solid #ed1c24;
        }

        .brand-title {
            font-family: 'Poppins', sans-serif;
            font-size: 2.2rem;
            color: #1a2a6c;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .feature-pills {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
            margin: 25px 0;
        }

        .pill {
            background: #f0f2f5;
            color: #1a2a6c;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            border: 1px solid #ddd;
            transition: 0.3s;
        }

        .pill:hover {
            background: #ed1c24;
            color: white;
            transform: translateY(-3px);
        }

        .btn-get-started {
            width: 100%;
            padding: 15px;
            background: #ed1c24;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.4s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-get-started:hover {
            background: #1a2a6c;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(237, 28, 36, 0.3);
        }

        .main-logo {
            width: 200px;
            margin-bottom: 20px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.1));
        }
    </style>
</head>
<body class="welcome-bg">
    <div class="circle" style="width: 300px; height: 300px; top: -50px; left: -50px;"></div>
    <div class="circle" style="width: 200px; height: 200px; bottom: -50px; right: -50px;"></div>

    <div class="welcome-container">
        <div class="welcome-card animate-fade-in">
            <img src="https://www.chitkara.edu.in/wp-content/themes/chitkara/images/logo.png" alt="Chitkara Logo" class="main-logo">
            
            <h1 class="brand-title">FACULTY CONNECT</h1>
            <p style="color: #666; font-weight: 600;">Digital Campus Ecosystem</p>
            
            <div class="divider" style="height: 3px; background: #ed1c24; width: 50px; margin: 15px auto;"></div>
            
            <p class="brand-tagline" style="font-size: 0.95rem; line-height: 1.6; color: #444;">
                Access <strong>Live Faculty Status</strong>, Academic Resources, and <strong>Automated Attendance</strong> in one unified platform.
            </p>

            <div class="feature-pills">
                <span class="pill"><i class="fas fa-signal"></i> Live Status</span>
                <span class="pill"><i class="fas fa-file-pdf"></i> ERP Notes</span>
                <span class="pill"><i class="fas fa-clock"></i> Timetable</span>
            </div>

            <button class="btn-get-started" onclick="location.href='role.html'">
                GET STARTED <i class="fas fa-arrow-right"></i>
            </button>

            <footer style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px;">
                <p style="font-size: 0.8rem; color: #888;">© 2026 Chitkara University | Final Year Project</p>
                <p style="font-size: 0.75rem; font-weight: bold; color: #1a2a6c;">Developed by Muskan</p>
            </footer>
        </div>
    </div>

    <script>
        // Simple entry animation
        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.welcome-card');
            card.style.opacity = '0';
            card.style.transform = 'translateY(20px)';
            setTimeout(() => {
                card.style.transition = 'all 0.8s ease-out';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body>
</html>
