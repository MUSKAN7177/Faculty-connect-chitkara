<!DOCTYPE html>
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Faculty Connect</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
</head>
<body class="welcome-bg">
    <div class="welcome-container animate-fade-in">
        <div class="logo-box">
            <img src="https://www.chitkara.edu.in/wp-content/themes/chitkara/images/logo.png" alt="Chitkara Logo" class="main-logo">
        </div>

        <div class="welcome-card">
            <h1 class="brand-title">FACULTY CONNECT</h1>
            <div class="divider"></div>
            
            <p class="brand-tagline">
                Bridging the gap between <strong>Academics & Accessibility</strong>. 
                Manage your campus life in real-time.
            </p>

            <div class="feature-pills">
                <span class="pill"><i class="fas fa-bolt"></i> Live Status</span>
                <span class="pill"><i class="fas fa-calendar"></i> Timetables</span>
                <span class="pill"><i class="fas fa-check-circle"></i> Approvals</span>
            </div>

            <button class="btn-get-started" onclick="location.href='role.html'">
                GET STARTED <span class="arrow">→</span>
            </button>
        </div>

        <footer class="welcome-footer">
            <p>© 2026 Chitkara University</p>
            <p>BCA Final Year Capstone Project</p>
        </footer>
    </div>
</body>
</html>
