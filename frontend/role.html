<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Role | Faculty Connect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Extra styling for better UX */
        .role-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        .role-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15);
        }
        .role-card:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="auth-page">
    <div class="role-container animate-fade-in">
        <div class="auth-header">
            <img src="https://www.chitkara.edu.in/wp-content/themes/chitkara/images/logo.png" alt="Chitkara Logo" class="auth-logo">
            <h2>Select Identity</h2>
            <p>Choose your role to access the portal</p>
        </div>

        <div class="role-grid">
            <div class="role-card" onclick="selectRole('teacher')">
                <div class="role-icon teacher-bg">
                    <i class="fas fa-chalkboard-teacher"></i>
                </div>
                <h3>Faculty</h3>
                <p>Manage live status, classes & requests</p>
            </div>

            <div class="role-card" onclick="selectRole('student')">
                <div class="role-icon student-bg">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <h3>Student</h3>
                <p>Check faculty status, ERP & Gatepass</p>
            </div>
        </div>

        <div class="auth-footer" style="margin-top: 30px;">
            <p>© 2026 Chitkara University | Faculty Connect</p>
            <small style="opacity: 0.6; cursor: pointer;" onclick="selectRole('admin')">Admin Portal</small>
        </div>
    </div>

    <script>
        function selectRole(role) {
            // Role ko storage mein save kar rahe hain taaki login/signup page pe use ho sake
            localStorage.setItem("userRole", role); 
            
            // Redirect to login page
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
