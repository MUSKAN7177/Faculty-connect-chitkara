<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Role | Faculty Connect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <img src="https://www.chitkara.edu.in/wp-content/themes/chitkara/images/logo.png" style="width: 220px; margin-bottom: 20px;">
        <h2>Welcome to Portal</h2>
        <p>Please select your identity to continue</p>
        <div class="role-box">
            <button onclick="selectRole('teacher')">Faculty / Teacher</button>
<button onclick="selectRole('student')">Student</button>

<script>
function selectRole(role) {
    localStorage.setItem("selectedRole", role); // Yahan value save ho rahi hai
    window.location.href = "login.html";
}
</script>
        </div>
    </div>
    <script>
        function setRole(role) {
            localStorage.setItem("userRole", role); 
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
