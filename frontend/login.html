<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Faculty Connect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="login-card animate-fade-in">
        <div class="auth-header">
            <img src="https://www.chitkara.edu.in/wp-content/themes/chitkara/images/logo.png" alt="Chitkara Logo" class="auth-logo">
            <h2 id="loginTitle">Student Login</h2>
            <p id="roleBadge" class="badge-role">STUDENT</p>
        </div>

        <form onsubmit="handleLogin(event)" class="auth-form">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="loginEmail" placeholder="Official Email (name@chitkara.edu.in)" required>
            </div>
            
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="Password" required>
            </div>

            <button type="submit" class="btn-auth">SIGN IN <i class="fas fa-arrow-right"></i></button>
        </form>

        <div class="auth-footer">
            <p>New user? <a href="signup.html">Register here</a></p>
            <button onclick="location.href='role.html'" class="btn-text">
                <i class="fas fa-chevron-left"></i> Change Role
            </button>
        </div>
    </div>

    <script>
        window.onload = function() {
            // Hum 'userRole' use kar rahe hain jo role.html se set hota hai
            const role = localStorage.getItem("userRole") || "student";
            const badge = document.getElementById("roleBadge");
            const title = document.getElementById("loginTitle");

            badge.innerText = role.toUpperCase();
            
            if(role === 'teacher') {
                title.innerText = "Faculty Login";
                badge.style.backgroundColor = "#2c3e50"; // Faculty ke liye dark blue/grey
            } else {
                title.innerText = "Student Login";
                badge.style.backgroundColor = "#d32f2f"; // Student ke liye Chitkara Red
            }
        }
    </script>
    <script src="app.js"></script>
</body>
</html>
