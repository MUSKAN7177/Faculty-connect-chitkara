<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Faculty Connect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2 id="loginTitle">Login</h2>
        <p>Enter your credentials to access dashboard</p>

        <form onsubmit="handleLogin(event)">
            <input type="email" id="loginEmail" placeholder="Official Email (e.g. @chitkara.edu.in)" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>

        <p style="margin-top: 20px;">
            New user? <a href="signup.html" style="color: var(--chitkara-red); font-weight: bold; text-decoration: none;">Register here</a>
        </p>
        <button onclick="location.href='role.html'" style="background: transparent; color: var(--text-light); font-size: 12px; margin-top: 10px; box-shadow: none;">← Change Role</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
