<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Faculty Connect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2 id="loginTitle">Login</h2>
        <p id="roleText" style="font-weight: bold; color: #8b0000;"></p>

        <form onsubmit="handleLogin(event)">
            <input type="email" id="loginEmail" placeholder="Official Email" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit">Sign In</button>
        </form>

        <p style="margin-top: 20px;">
            New user? <a href="signup.html" style="color: #8b0000; font-weight: bold; text-decoration: none;">Register here</a>
        </p>
        <button onclick="location.href='role.html'" style="background: transparent; border:none; color: #666; cursor:pointer;">← Change Role</button>
    </div>

    <script>
        const role = localStorage.getItem("selectedRole") || "student";
        document.getElementById("roleText").innerText = `Logging in as ${role.toUpperCase()}`;

        async function handleLogin(e) {
            e.preventDefault();
            const API_URL = "https://chitkara-faculty-app-2026.onrender.com";
            
            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;

            const res = await fetch(`${API_URL}/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password, role })
            });

            const result = await res.json();
            if (result.success) {
                // VERY IMPORTANT: Storing full user object with Branch/Semester
                localStorage.setItem("user", JSON.stringify(result.user));
                
                if (role === "student") {
                    window.location.href = "student-dashboard.html";
                } else {
                    window.location.href = "teacher-dashboard.html";
                }
            } else {
                alert("Invalid Credentials!");
            }
        }
    </script>
</body>
</html>
