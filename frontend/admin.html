<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Faculty Connect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="admin-body">

    <div class="admin-container">
        <header class="admin-header">
            <h1><i class="fas fa-user-shield"></i> Admin Control Center</h1>
            <p>Chitkara University | Faculty Connect Management</p>
        </header>

        <div class="admin-grid">
            <section class="admin-card">
                <h3><i class="fas fa-user-plus"></i> Add New Faculty</h3>
                <div class="form-group">
                    <input type="text" id="name" placeholder="Faculty Full Name">
                    <input type="text" id="univId" placeholder="University ID (e.g. T1001)">
                    <input type="email" id="email" placeholder="Official Email Address">
                    <input type="password" id="password" placeholder="Temporary Password">
                    
                    <select id="dept">
                        <option value="" disabled selected>Select Department</option>
                        <option value="BCA">BCA (Computer Applications)</option>
                        <option value="CSE">CSE (Computer Science)</option>
                        <option value="MCA">MCA</option>
                    </select>

                    <button class="btn-primary" onclick="addTeacher()">
                        <i class="fas fa-save"></i> Register Faculty
                    </button>
                </div>
            </section>

            <section class="admin-card stats-card">
                <h3><i class="fas fa-chart-line"></i> Quick Overview</h3>
                <div class="stats-grid">
                    <div class="stat-item blue">
                        <span id="teacherCount">0</span>
                        <label>Teachers</label>
                    </div>
                    <div class="stat-item red">
                        <span id="pendingGatepass">0</span>
                        <label>Gatepass Req.</label>
                    </div>
                    <div class="stat-item orange">
                        <span id="pendingLeave">0</span>
                        <label>Medical Leaves</label>
                    </div>
                </div>
            </section>
        </div>

        <section class="admin-card full-width">
            <h3><i class="fas fa-tasks"></i> Pending Approvals (Gatepass / Leaves)</h3>
            <div class="table-container">
                <table id="requestsTable">
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Type</th>
                            <th>Reason/Illness</th>
                            <th>Date</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="requestBody">
                        </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const API_URL = "https://chitkara-faculty-app-2026.onrender.com";

        // 1. Add Teacher Function
        async function addTeacher() {
            const data = {
                name: document.getElementById("name").value,
                universityId: document.getElementById("univId").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value,
                role: "teacher",
                department: document.getElementById("dept").value,
                status: "Available",
                notifications: []
            };

            try {
                const response = await fetch(`${API_URL}/signup`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                if (result.success) {
                    alert("✅ Faculty Member Added Successfully!");
                    location.reload();
                }
            } catch (err) {
                alert("❌ Error connecting to server");
            }
        }

        // 2. Load Requests (Gatepass & Medical)
        async function loadRequests() {
            try {
                const gpRes = await fetch(`${API_URL}/gatepasses`);
                const gatepasses = await gpRes.json();
                
                const mlRes = await fetch(`${API_URL}/medical-leaves`);
                const leaves = await mlRes.json();

                const tbody = document.getElementById("requestBody");
                tbody.innerHTML = "";

                // Displaying counts
                document.getElementById("pendingGatepass").innerText = gatepasses.filter(g => g.status === 'Pending').length;
                document.getElementById("pendingLeave").innerText = leaves.filter(l => l.status === 'Pending').length;

                // Merge and show (simplifying for now)
                gatepasses.forEach(gp => {
                    if(gp.status === "Pending") {
                        tbody.innerHTML += `
                            <tr>
                                <td>${gp.studentName}</td>
                                <td><span class="badge gatepass">Gatepass</span></td>
                                <td>${gp.reason}</td>
                                <td>${new Date(gp.date).toLocaleDateString()}</td>
                                <td>
                                    <button class="btn-approve" onclick="updateStatus('${gp._id}', 'Approved')">Approve</button>
                                </td>
                            </tr>
                        `;
                    }
                });
            } catch (err) { console.log(err); }
        }

        async function updateStatus(id, status) {
            await fetch(`${API_URL}/update-gatepass`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ passId: id, status: status })
            });
            alert("Status Updated & Email Sent!");
            loadRequests();
        }

        window.onload = loadRequests;
    </script>
</body>
</html>
