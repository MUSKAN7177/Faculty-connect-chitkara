<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard | Faculty Connect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 900px; border-top: 8px solid var(--chitkara-red);">
        <h2 id="welcomeMsg">Welcome, Student</h2>
        <div class="dashboard-section">
            <h3>Available Faculty</h3>
            <div id="teacherContainer" class="dashboard-container">
                <p>Loading teachers...</p>
            </div>
        </div>
        <button onclick="logout()" style="margin-top: 30px; background: #555; width: 150px;">Logout</button>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user"));
        const role = localStorage.getItem("userRole");

        if (!user || role !== "student") {
            window.location.href = "login.html";
        } else {
            document.getElementById("welcomeMsg").innerText = `Welcome, ${user.name}`;
        }

        async function loadTeachers() {
            const container = document.getElementById("teacherContainer");
            try {
                const res = await fetch("https://chitkara-faculty-app-2026.onrender.com/teachers");
                const teachers = await res.json();
                container.innerHTML = "";
                teachers.forEach(t => {
                    container.innerHTML += `
                        <div class="card">
                            <h4>Prof. ${t.name}</h4>
                            <p>Dept: ${t.department}</p>
                            <p>Status: <span style="color: ${t.status === 'Available' ? 'green' : 'red'}; font-weight:bold;">${t.status}</span></p>
                            <button onclick="sendRequest('${t._id}', '${t.name}')">Send Request</button>
                        </div>`;
                });
            } catch (err) { container.innerHTML = "Error loading teachers."; }
        }

        async function sendRequest(tId, tName) {
            const msg = prompt(`Enter message for Prof. ${tName}:`);
            if(!msg) return;
            try {
                const res = await fetch("https://chitkara-faculty-app-2026.onrender.com/send-request", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        teacherId: tId,
                        studentName: user.name,
                        studentId: user._id,
                        message: msg
                    })
                });
                const data = await res.json();
                alert(data.msg);
            } catch (err) { alert("Failed to send request."); }
        }

        function logout() { localStorage.clear(); window.location.href = "role.html"; }
        window.onload = loadTeachers;
    </script>
</body>
</html>
