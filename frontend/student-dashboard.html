<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Faculty Connect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --chitkara-navy: #1a2a6c;
            --chitkara-red: #d32f2f;
            --gold-accent: #ffcc00;
        }

        /* Sidebar Styling */
        .erp-sidebar { background: linear-gradient(180deg, var(--chitkara-navy) 0%, #243b55 100%) !important; }
        .nav-item.active {
            background: rgba(255, 255, 255, 0.15) !important;
            border-left: 5px solid var(--gold-accent) !important;
            color: #fff !important;
        }

        /* Appointment Cards */
        .apt-card {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #eee;
        }
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-approved { background: #d4edda; color: #155724; }
        .status-declined { background: #f8d7da; color: #721c24; }

        /* Faculty Status Grid */
        .faculty-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .fac-card { background: #fff; padding: 20px; border-radius: 15px; text-align: center; border-top: 5px solid var(--chitkara-navy); }
        .status-indicator { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 5px; }

        /* Timetable Pulse */
        .live-border { border: 2px solid var(--chitkara-red); background: #fff9f9; }
        .pulse-icon {
            background: var(--chitkara-red); color: white; padding: 4px 10px; border-radius: 50px;
            font-size: 10px; animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(211, 47, 47, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(211, 47, 47, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(211, 47, 47, 0); }
        }
    </style>
</head>
<body class="erp-body">

    <div class="dashboard-wrapper">
        <nav class="erp-sidebar">
            <div class="sidebar-header">
                <img src="https://www.chitkara.edu.in/wp-content/themes/chitkara/images/logo.png" class="erp-logo" width="180">
            </div>
            <div class="user-info-brief">
                <p id="userNameDisplay" style="font-weight: bold; color: white;">Loading...</p>
                <small id="userDeptDisplay" style="color: rgba(255,255,255,0.7);">BCA</small>
            </div>
            <ul class="nav-menu">
                <li onclick="showTab('academics')" class="nav-item active"><i class="fas fa-graduation-cap"></i> Academics</li>
                <li onclick="showTab('timetable')" class="nav-item"><i class="fas fa-calendar-alt"></i> Time Table</li>
                <li onclick="showTab('availability')" class="nav-item"><i class="fas fa-user-check"></i> Faculty Status</li>
                <li onclick="showTab('appointments')" class="nav-item"><i class="fas fa-handshake"></i> Appointments</li>
                <li onclick="showTab('gatepass')" class="nav-item"><i class="fas fa-door-open"></i> Gatepass</li>
                <li onclick="showTab('profile')" class="nav-item"><i class="fas fa-id-card"></i> My Profile</li>
                <li onclick="logout()" class="nav-item logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</li>
            </ul>
        </nav>

        <main class="erp-main">
            <header class="erp-header" style="display: flex; justify-content: space-between; align-items: center; padding: 20px;">
                <h2 id="tabTitle">Academic Overview</h2>
                <span id="currentDate" class="badge-date"></span>
            </header>

            <div id="academics" class="tab-content active">
                <div class="stats-row">
                    <div class="stat-card card">
                        <p>Total Attendance</p>
                        <h3 id="myAttVal">0%</h3>
                        <div style="background:#eee; height:8px; border-radius:5px;">
                            <div id="barVisual" style="height:100%; width:0%; background:var(--chitkara-red); border-radius:5px; transition:0.5s;"></div>
                        </div>
                    </div>
                </div>
                <div class="marks-section card">
                    <h3>Internal Assessment Marks</h3>
                    <table class="erp-table" width="100%">
                        <thead><tr><th>Component</th><th>Marks</th></tr></thead>
                        <tbody id="marksBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="appointments" class="tab-content" style="display: none;">
                <div class="card">
                    <h3>Book Appointment</h3>
                    <form onsubmit="handleAptRequest(event)" class="form-grid">
                        <select id="facSelect" class="input-style" required>
                            <option value="">Select Faculty</option>
                        </select>
                        <input type="text" id="aptReason" placeholder="Reason for meeting" required class="input-style">
                        <input type="datetime-local" id="aptTime" required class="input-style">
                        <button type="submit" class="btn-submit">Send Request</button>
                    </form>
                </div>
                <div class="card" style="margin-top:20px;">
                    <h3>My Requests Status</h3>
                    <div id="aptStatusList"></div>
                </div>
            </div>

            <div id="availability" class="tab-content" style="display: none;">
                <div class="faculty-grid" id="facultyStatusList"></div>
            </div>

            <div id="timetable" class="tab-content" style="display: none;">
                <div class="card" id="timetableContainer"></div>
            </div>

            <div id="gatepass" class="tab-content" style="display: none;">
                <div class="card">
                    <h3>Apply for Gatepass</h3>
                    <form onsubmit="requestGatepass(event)">
                        <input type="text" id="gpReason" placeholder="Reason" class="input-style" required>
                        <input type="time" id="gpTime" class="input-style" required>
                        <button class="btn-submit">Apply Now</button>
                    </form>
                </div>
            </div>

            <div id="profile" class="tab-content" style="display: none;">
                <div id="profileIDCard"></div>
            </div>

        </main>
    </div>

    <script src="app.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem("user"));

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            event.currentTarget.classList.add('active');

            if(tabId === 'availability') loadFacultyLiveStatus();
            if(tabId === 'appointments') { loadFacultyDropdown(); loadMyAppointments(); }
            if(tabId === 'academics') loadERPData();
            if(tabId === 'profile') loadProfileCard();
            if(tabId === 'timetable') loadClassTimetable();
        }

        window.onload = () => {
            if(!user) window.location.href="login.html";
            document.getElementById("userNameDisplay").innerText = user.name;
            document.getElementById("userDeptDisplay").innerText = user.department + " | Sem " + (user.semester || "6");
            document.getElementById("currentDate").innerText = new Date().toDateString();
            loadERPData();
        };

        // --- Appointment Logic ---
        async function loadFacultyDropdown() {
            const res = await fetch(`${API_BASE}/teachers`);
            const teachers = await res.json();
            document.getElementById("facSelect").innerHTML = '<option value="">Select Faculty</option>' + 
                teachers.map(t => `<option value="${t._id}">${t.name}</option>`).join('');
        }

        async function handleAptRequest(e) {
            e.preventDefault();
            const data = {
                studentId: user._id,
                studentName: user.name,
                teacherId: document.getElementById("facSelect").value,
                reason: document.getElementById("aptReason").value,
                time: document.getElementById("aptTime").value
            };
            const res = await fetch(`${API_BASE}/book-appointment`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            if(res.ok) { alert("Request Sent!"); loadMyAppointments(); }
        }

        async function loadMyAppointments() {
            const res = await fetch(`${API_BASE}/my-appointments/${user._id}`);
            const data = await res.json();
            document.getElementById("aptStatusList").innerHTML = data.map(a => `
                <div class="apt-card">
                    <div>
                        <strong>${a.teacherName}</strong><br>
                        <small>${new Date(a.time).toLocaleString()}</small>
                    </div>
                    <span class="status-pill status-${a.status.toLowerCase()}">${a.status}</span>
                </div>
            `).join('') || "No requests found.";
        }

        // --- Live Faculty Status ---
        async function loadFacultyLiveStatus() {
            const res = await fetch(`${API_BASE}/teachers`);
            const teachers = await res.json();
            document.getElementById("facultyStatusList").innerHTML = teachers.map(t => `
                <div class="fac-card">
                    <div class="avatar-circle" style="margin: 0 auto 10px; width:60px; height:60px; font-size:24px; border:2px solid #eee;">
                        <i class="fas fa-user-tie"></i>
                    </div>
                    <h4>Prof. ${t.name}</h4>
                    <p><span class="status-indicator" style="background: ${t.status.includes('Available') ? '#27ae60' : '#d32f2f'}"></span> 
                    ${t.status}</p>
                    <small>Cabin: ${t.cabin || 'Not Set'}</small>
                </div>
            `).join('');
        }

        // --- Timetable logic ---
        async function loadClassTimetable() {
            const container = document.getElementById("timetableContainer");
            container.innerHTML = "<h3>Class Schedule (BCA Sem 6 Section C)</h3><p>Loading automated schedule...</p>";
            // Logic linked to app.js fetch
        }

        function logout() { localStorage.clear(); window.location.href="login.html"; }
    </script>
</body>
</html>
