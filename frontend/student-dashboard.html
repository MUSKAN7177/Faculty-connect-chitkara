<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student ERP | Faculty Connect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 900px;">
        <h2>🎓 Student ERP Portal</h2>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('erp')">📊 Attendance & Marks</button>
            <button class="tab-btn" onclick="showTab('book')">🤝 Book Appointment</button>
            <button class="tab-btn" onclick="showTab('view-notes')">📚 Notes & Timetable</button>
        </div>

        <div id="erp" class="section-content active">
            <div class="card">
                <h3>My Academic Progress</h3>
                <p>Attendance: <span id="myAtt">0</span>%</p>
                <div class="progress-container"><div id="bar" class="progress-bar"></div></div>
                <p>ST1 Marks: <span id="st1">0</span></p>
            </div>
        </div>

        <div id="book" class="section-content">
            <div class="card">
                <h3>Connect with Faculty</h3>
                <select id="teacherSelect"></select>
                <textarea id="msg" placeholder="Reason for meeting..."></textarea>
                <button onclick="sendRequest()">Book Appointment</button>
            </div>
            <div class="card">
                <h3>Appointment Status</h3>
                <div id="statusUpdate">Check your email for Approved/Declined alerts.</div>
            </div>
        </div>

        <div id="view-notes" class="section-content">
            <div class="card" id="notesArea"></div>
        </div>

        <button onclick="logout()" style="background: #555;">Logout</button>
    </div>

    <script>
        // Same logic for tabs and loading data as above...
        const user = JSON.parse(localStorage.getItem("user"));
        const API_URL = "https://chitkara-faculty-app-2026.onrender.com";

        async function loadStudentERP() {
            // Load Teachers for Appointment
            const resT = await fetch(`${API_URL}/teachers`);
            const teachers = await resT.json();
            document.getElementById("teacherSelect").innerHTML = teachers.map(t => 
                `<option value="${t._id}">${t.name} (${t.status})</option>`).join('');

            // Load Own Data
            const resS = await fetch(`${API_URL}/students`);
            const students = await resS.json();
            const me = students.find(s => s._id === user._id);
            if(me) {
                document.getElementById("myAtt").innerText = me.attendance || 0;
                document.getElementById("bar").style.width = (me.attendance || 0) + "%";
                document.getElementById("st1").innerText = me.marks?.st1 || 0;
            }
        }

        async function sendRequest() {
            const tId = document.getElementById("teacherSelect").value;
            const msg = document.getElementById("msg").value;
            await fetch(`${API_URL}/send-request`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ teacherId: tId, studentName: user.name, studentId: user._id, message: msg })
            });
            alert("Request Sent! Teacher will be notified.");
        }

        window.onload = loadStudentERP;
        function showTab(id) { /* Same tab switching logic */ }
    </script>
</body>
</html>
