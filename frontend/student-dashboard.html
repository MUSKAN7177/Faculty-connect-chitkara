<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard | Faculty Connect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 900px; border-top: 8px solid var(--chitkara-red);">
        <h2 id="welcomeMsg">Welcome, Professor</h2>
        <p>Manage your meeting requests and student connections below.</p>
        
        <div class="dashboard-section">
            <h3>New Requests</h3>
            <div id="notificationContainer" class="dashboard-container">
                <p>Loading notifications...</p>
            </div>
        </div>

        <button onclick="logout()" style="margin-top: 30px; background: #555; width: 150px;">Logout</button>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user"));
        if (!user || user.role !== "teacher") { // Basic role check
            window.location.href = "login.html";
        } else {
            document.getElementById("welcomeMsg").innerText = `Welcome, Prof. ${user.name}`;
        }

        // 1. Notifications fetch aur display karna
        async function loadNotifications() {
            const container = document.getElementById("notificationContainer");
            
            try {
                // Latest notifications ke liye pure teachers ki list fetch kar rahe hain
                const res = await fetch("https://chitkara-faculty-app-2026.onrender.com/teachers");
                const teachers = await res.json();
                
                // Login kiye hue teacher ka data filter karna
                const currentTeacher = teachers.find(t => t._id === user._id);
                
                container.innerHTML = "";

                if (!currentTeacher.notifications || currentTeacher.notifications.length === 0) {
                    container.innerHTML = "<p>No meeting requests found.</p>";
                    return;
                }

                // Naye requests ko sabse upar dikhane ke liye reverse()
                currentTeacher.notifications.slice().reverse().forEach(note => {
                    const statusColor = note.status === 'pending' ? 'orange' : note.status === 'Accepted' ? 'green' : 'red';
                    
                    container.innerHTML += `
                        <div class="card" style="border-left: 5px solid ${statusColor}; margin-bottom: 15px;">
                            <h4>From: ${note.studentName}</h4>
                            <p><strong>Message:</strong> ${note.message || "No message provided."}</p>
                            <p>Status: <span style="color: ${statusColor}; font-weight: bold;">${note.status.toUpperCase()}</span></p>
                            
                            ${note.status === 'pending' ? `
                                <div style="margin-top: 10px;">
                                    <button onclick="updateStatus('${note.id}', '${note.studentId}', 'Accepted')" style="background:green; margin-right:10px;">Accept</button>
                                    <button onclick="updateStatus('${note.id}', '${note.studentId}', 'Rejected')" style="background:red;">Reject</button>
                                </div>
                            ` : `<p><i>Action already taken</i></p>`}
                        </div>
                    `;
                });
            } catch (err) {
                console.error(err);
                container.innerHTML = "<p style='color:red;'>Error loading notifications. Please try again.</p>";
            }
        }

        // 2. Status update aur student ko mail bhejne wala logic
        async function updateStatus(notifId, sId, status) {
            if(!confirm(`Are you sure you want to ${status} this request?`)) return;

            try {
                const res = await fetch("https://chitkara-faculty-app-2026.onrender.com/update-status", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        teacherId: user._id,
                        studentId: sId,
                        notificationId: notifId,
                        newStatus: status
                    })
                });

                const data = await res.json();
                if (data.success) {
                    alert(`✅ Meeting ${status}! Student has been notified via email.`);
                    loadNotifications(); // UI refresh
                } else {
                    alert("❌ Error: " + data.msg);
                }
            } catch (err) {
                alert("🚨 Server error! Student ko mail nahi ja paya.");
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = "role.html";
        }

        window.onload = loadNotifications;
    </script>
</body>
</html>
