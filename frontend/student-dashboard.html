<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student ERP | Faculty Connect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2 id="welcomeText">Student ERP Portal</h2>
        
        <nav class="tabs">
            <button class="tab-btn active" id="tab-academics" onclick="showTab('academics')">📋 Academic Progress</button>
            <button class="tab-btn" id="tab-book" onclick="showTab('book')">🤝 Book Appointment</button>
            <button class="tab-btn" id="tab-material" onclick="showTab('material')">📚 Notes & Timetable</button>
        </nav>

        <div id="academics" class="section-content active">
            <div class="academic-card">
                <h3>My Current Status</h3>
                <div class="dashboard-grid">
                    <div class="erp-card" id="cardAttendance">
                        <div class="card-title">Attendance</div>
                        <div class="card-value"><span id="myAttVal">0</span>%</div>
                    </div>
                    <div class="erp-card">
                        <div class="card-title">ST1 Marks</div>
                        <div class="card-value"><span id="myST1">0</span></div>
                    </div>
                    <div class="erp-card">
                        <div class="card-title">ST2 Marks</div>
                        <div class="card-value"><span id="myST2">0</span></div>
                    </div>
                </div>
                <div class="prog-container"><div id="barVisual" class="prog-bar" style="width: 0%;">0%</div></div>
            </div>
        </div>

        <div id="book" class="section-content">
            <div class="academic-card">
                <h3>Connect with Faculty</h3>
                <select id="teacherSelect"></select>
                <textarea id="msg" placeholder="Reason for meeting..."></textarea>
                <button class="btn-primary" onclick="sendRequest()">Book Appointment</button>
            </div>
        </div>

        <div id="material" class="section-content">
            <div class="academic-card">
                <h3>📅 Today's Class Schedule</h3>
                <div id="timetableInbox">Loading timetable...</div>
            </div>
            <div class="academic-card">
                <h3>📚 Study Materials & Notes</h3>
                <div id="notesInbox">Loading notes...</div>
            </div>
        </div>

        <div style="text-align: center; padding-bottom: 20px;">
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user"));
        const API_URL = "https://chitkara-faculty-app-2026.onrender.com";

        if (!user) window.location.href = "login.html";
        document.getElementById("welcomeText").innerText = `Welcome, ${user.name}`;

        function showTab(tabId) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
            
            if (tabId === 'material') loadMaterial();
            if (tabId === 'academics') loadERPData();
            if (tabId === 'book') loadFaculty();
        }

        async function loadERPData() {
            const res = await fetch(`${API_URL}/students`);
            const students = await res.json();
            const me = students.find(s => s._id === user._id);
            if (me) {
                const att = me.attendance || 0;
                document.getElementById("myAttVal").innerText = att;
                document.getElementById("myST1").innerText = me.marks?.st1 || 0;
                document.getElementById("barVisual").style.width = att + "%";
                document.getElementById("barVisual").innerText = att + "%";
                document.getElementById("barVisual").style.background = att < 75 ? "red" : "green";
            }
        }

        async function loadMaterial() {
            const res = await fetch(`${API_URL}/notes`);
            const data = await res.json();
            const noteDiv = document.getElementById("notesInbox");
            const ttDiv = document.getElementById("timetableInbox");
            
            noteDiv.innerHTML = ""; ttDiv.innerHTML = "";
            
            data.forEach(item => {
                const html = `
                    <div class="inbox-item" style="border-left: 5px solid ${item.category === 'timetable' ? '#ffcc00' : '#8b0000'}; margin-bottom:10px; padding:10px; background:#f9f9f9; border-radius:5px;">
                        <strong>${item.subject}</strong> <br>
                        <small>${item.category === 'timetable' ? '📍 Class: ' + item.link : '🔗 Link: <a href="'+item.link+'" target="_blank">View Note</a>'}</small>
                        <br><small>Prof. ${item.teacherName}</small>
                    </div>`;
                
                if(item.category === 'timetable') ttDiv.innerHTML += html;
                else noteDiv.innerHTML += html;
            });
        }

        async function loadFaculty() {
            const res = await fetch(`${API_URL}/teachers`);
            const teachers = await res.json();
            document.getElementById("teacherSelect").innerHTML = teachers.map(t => `<option value="${t._id}">${t.name} (${t.status})</option>`).join('');
        }

        async function sendRequest() {
            const tId = document.getElementById("teacherSelect").value;
            const msg = document.getElementById("msg").value;
            await fetch(`${API_URL}/send-request`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ teacherId: tId, studentName: user.name, studentId: user._id, message: msg })
            });
            alert("Request Sent!");
        }

        function logout() { localStorage.clear(); window.location.href="role.html"; }
        window.onload = loadERPData;
    </script>
</body>
</html>
