<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student ERP | Faculty Connect</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Container width fix for professional look */
        .container { max-width: 1100px !important; width: 95%; margin: 20px auto; }
        
        /* CUIMS Grid Styling */
        .cuims-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .grid-item { 
            background: white; padding: 15px; border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; 
            transition: 0.3s; text-align: center;
        }
        .grid-item:hover { transform: translateY(-5px); }
        .grid-item p { font-size: 12px; font-weight: bold; color: #8b0000; margin-top: 5px; }

        /* Timetable Period Styling */
        .period-card {
            border-left: 5px solid #28a745; background: #f8f9fa; 
            padding: 15px; margin-bottom: 10px; display: flex; 
            justify-content: space-between; border-radius: 0 8px 8px 0;
        }
        .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="welcomeText" style="text-align: center; padding-bottom: 10px;">Student ERP Portal</h2>
        
        <div class="cuims-grid">
            <div class="grid-item" onclick="showTab('academics')">
                <img src="https://cdn-icons-png.flaticon.com/512/3589/3589030.png" width="40">
                <p>Attendance</p>
            </div>
            <div class="grid-item" onclick="showTab('material')">
                <img src="https://cdn-icons-png.flaticon.com/512/2436/2436636.png" width="40">
                <p>Resources</p>
            </div>
            <div class="grid-item" onclick="showTab('timetable')">
                <img src="https://cdn-icons-png.flaticon.com/512/3652/3652191.png" width="40">
                <p>Time Table</p>
            </div>
        </div>

        <div id="timetable" class="section-content" style="display: none;">
            <div class="academic-card">
                <h3 style="border-bottom: 2px solid #f1f1f1; padding-bottom: 10px; margin-bottom: 15px;">Wednesday (Today) ▼</h3>
                <div id="detailedTimetable">Loading schedule...</div>
            </div>
        </div>
        
        <div id="academics" class="section-content active">
            <div class="academic-card">
                <h3>My Current Status</h3>
                <div class="dashboard-grid">
                    <div class="erp-card" id="cardAttendance">
                        <div class="card-title">Attendance</div>
                        <div class="card-value"><span id="myAttVal">0</span>%</div>
                    </div>
                    <div class="erp-card">
                        <div class="card-title">ST1 Marks</div>
                        <div class="card-value"><span id="myST1">0</span></div>
                    </div>
                    <div class="erp-card">
                        <div class="card-title">ST2 Marks</div>
                        <div class="card-value"><span id="myST2">0</span></div>
                    </div>
                </div>
                <div class="prog-container"><div id="barVisual" class="prog-bar" style="width: 0%;">0%</div></div>
            </div>
        </div>

        <div id="book" class="section-content" style="display: none;">
            <div class="academic-card">
                <h3>Connect with Faculty</h3>
                <select id="teacherSelect"></select>
                <textarea id="msg" placeholder="Reason for meeting..."></textarea>
                <button class="btn-primary" onclick="sendRequest()">Book Appointment</button>
            </div>
        </div>

        <div id="material" class="section-content" style="display: none;">
            <div class="academic-card">
                <h3>📚 Study Materials & Notes</h3>
                <div id="notesInbox">Loading notes...</div>
            </div>
        </div>

        <div style="text-align: center; padding: 20px 0;">
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user"));
        const API_URL = "https://chitkara-faculty-app-2026.onrender.com";

        if (!user) window.location.href = "login.html";
        document.getElementById("welcomeText").innerText = `Welcome, ${user.name}`;

        // Unified Tab Switching Logic
        function showTab(tabId) {
            document.querySelectorAll('.section-content').forEach(s => s.style.display = 'none');
            document.getElementById(tabId).style.display = 'block';
            
            if (tabId === 'material') loadMaterial();
            if (tabId === 'academics') loadERPData();
            if (tabId === 'timetable') loadDetailedTimetable();
            if (tabId === 'book' || !document.getElementById("teacherSelect").innerHTML) loadFaculty();
        }

        async function loadERPData() {
            const res = await fetch(`${API_URL}/students`);
            const students = await res.json();
            const me = students.find(s => s._id === user._id);
            if (me) {
                const att = me.attendance || 0;
                document.getElementById("myAttVal").innerText = att;
                document.getElementById("myST1").innerText = me.marks?.st1 || 0;
                document.getElementById("myST2").innerText = me.marks?.st2 || 0;
                const bar = document.getElementById("barVisual");
                bar.style.width = att + "%";
                bar.innerText = att + "%";
                bar.style.background = att < 75 ? "red" : "green";
            }
        }

        // Detailed Timetable Function (Based on your Screenshots)
        async function loadDetailedTimetable() {
            const res = await fetch(`${API_URL}/notes`);
            const data = await res.json();
            const ttDiv = document.getElementById("detailedTimetable");
            
            const schedule = data.filter(item => item.category === 'timetable');
            
            ttDiv.innerHTML = schedule.map((cls, index) => `
                <div class="period-card" style="border-left-color: ${index === 1 ? 'red' : '#28a745'}">
                    <div>
                        <strong style="color: #333;">Period ${index + 1} (LH6)</strong> <br>
                        <span style="font-size: 13px; color: #666;">${cls.subject}</span>
                    </div>
                    <div style="text-align: right;">
                        <span class="status-badge" style="background: ${index === 1 ? 'red' : '#007bff'}">
                            ${index === 1 ? 'LIVE' : 'Upcoming'}
                        </span> <br>
                        <small style="color: #888;">Prof. ${cls.teacherName}</small>
                    </div>
                </div>
            `).join('') || "<p>No classes scheduled today.</p>";
        }

        async function loadMaterial() {
            const res = await fetch(`${API_URL}/notes`);
            const data = await res.json();
            const noteDiv = document.getElementById("notesInbox");
            const notes = data.filter(item => item.category === 'note');
            
            noteDiv.innerHTML = notes.map(item => `
                <div class="inbox-item" style="border-left: 5px solid #8b0000; margin-bottom:10px; padding:10px; background:#f9f9f9; border-radius:5px;">
                    <strong>${item.subject}</strong> <br>
                    <small>🔗 Link: <a href="${item.link}" target="_blank">View Note</a></small>
                    <br><small>Prof. ${item.teacherName}</small>
                </div>
            `).join('') || "<p>No notes available.</p>";
        }

        async function loadFaculty() {
            const res = await fetch(`${API_URL}/teachers`);
            const teachers = await res.json();
            document.getElementById("teacherSelect").innerHTML = teachers.map(t => `<option value="${t._id}">${t.name} (${t.status})</option>`).join('');
        }

        async function sendRequest() {
            const tId = document.getElementById("teacherSelect").value;
            const msg = document.getElementById("msg").value;
            if(!msg) return alert("Please enter a reason!");
            await fetch(`${API_URL}/send-request`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ teacherId: tId, studentName: user.name, studentId: user._id, message: msg })
            });
            alert("Request Sent!");
        }

        function logout() { localStorage.clear(); window.location.href="role.html"; }
        window.onload = loadERPData;
    </script>
</body>
</html>
