<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard | ERP Portal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container { max-width: 1100px !important; width: 95%; margin: 20px auto; }
        .cuims-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin: 20px 0; }
        .grid-item { 
            background: white; padding: 15px; border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); cursor: pointer; 
            transition: 0.3s; text-align: center;
        }
        .grid-item:hover { transform: translateY(-5px); }
        .grid-item p { font-size: 11px; font-weight: bold; color: #8b0000; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        input[type="number"], input[type="time"], select { padding: 8px; border-radius: 6px; border: 1px solid #ddd; }
        .status-badge { padding: 4px 10px; border-radius: 4px; color: white; font-weight: bold; font-size: 12px; }
        .schedule-chip { background: #e9ecef; padding: 5px 10px; border-radius: 20px; font-size: 12px; margin: 5px; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align: center;">Welcome, Prof. <span id="tName"></span></h2>
        
        <div class="cuims-grid">
            <div class="grid-item" onclick="showTab('attendance')">
                <img src="https://cdn-icons-png.flaticon.com/512/3589/3589030.png" width="35">
                <p>Manage Records</p>
            </div>
            <div class="grid-item" onclick="showTab('appointments')">
                <img src="https://cdn-icons-png.flaticon.com/512/942/942799.png" width="35">
                <p>Appointments</p>
            </div>
            <div class="grid-item" onclick="showTab('availability-status')">
                <img src="https://cdn-icons-png.flaticon.com/512/3079/3079165.png" width="35">
                <p>My Status</p>
            </div>
            <div class="grid-item" onclick="showTab('material')">
                <img src="https://cdn-icons-png.flaticon.com/512/2436/2436636.png" width="35">
                <p>Upload Center</p>
            </div>
        </div>

        <div id="attendance" class="section-content active">
            <div class="academic-card">
                <h3>Update Student Records</h3>
                <table>
                    <thead><tr><th>Name</th><th>Roll No</th><th>Attendance %</th><th>ST1</th><th>Action</th></tr></thead>
                    <tbody id="studentBody"></tbody>
                </table>
            </div>
        </div>

        <div id="appointments" class="section-content" style="display: none;">
            <div class="academic-card">
                <h3>📩 Meeting Requests</h3>
                <div id="requestList">No requests yet.</div>
            </div>
        </div>

        <div id="availability-status" class="section-content" style="display: none;">
            <div class="academic-card" style="border-left: 5px solid #007bff;">
                <h3>⚙️ Live Availability</h3>
                <p>Set your current status for students:</p>
                <select id="statusSelect" onchange="updateLiveStatus()" style="width: 100%; margin-top: 10px;">
                    <option value="Available">🟢 Available</option>
                    <option value="Busy">🔴 Busy (In Class)</option>
                    <option value="Away">🟡 Away</option>
                </select>
            </div>
            <div class="academic-card" style="margin-top: 20px; border-left: 5px solid #ffc107;">
                <h3>📅 My Personal Timetable</h3>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <input type="time" id="myStartTime" style="flex:1;">
                    <input type="time" id="myEndTime" style="flex:1;">
                    <button onclick="addSchedule()" style="background: #28a745; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer;">Add Slot</button>
                </div>
                <div id="scheduleList" style="margin-top: 15px;"></div>
                <button onclick="saveTimetableToDB()" class="btn-primary" style="width: 100%; margin-top: 10px; background: #8b0000;">Save Full Schedule</button>
            </div>
        </div>

        <div id="material" class="section-content" style="display: none;">
            <div class="academic-card" style="border-top: 4px solid #28a745;">
                <h3>📚 Upload Notes</h3>
                <input type="text" id="subjectNote" placeholder="Subject Name">
                <input type="text" id="noteLink" placeholder="Google Drive Link">
                <button class="btn-primary" onclick="uploadMaterial('note')" style="background: #28a745; width: 100%;">Share Note</button>
            </div>
        </div>

        <div style="text-align: center; padding: 20px;">
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user"));
        // MAKE SURE THIS URL IS CORRECT
        const API_URL = "https://chitkara-faculty-app-2026.onrender.com";
        let personalSchedule = [];

        if (!user) window.location.href = "login.html";

        function showTab(tabId) {
            document.querySelectorAll('.section-content').forEach(s => s.style.display = 'none');
            document.getElementById(tabId).style.display = 'block';
        }

        async function loadTeacherData() {
            try {
                document.getElementById("tName").innerText = user.name;
                
                // 1. Fetch & Filter Students (Case-Insensitive)
                const resS = await fetch(`${API_URL}/students`);
                if (!resS.ok) throw new Error("Students fetch failed");
                const allStudents = await resS.json();
                
                const myStudents = allStudents.filter(s => 
                    s.department?.toLowerCase() === user.department?.toLowerCase()
                );
                
                const studentBody = document.getElementById("studentBody");
                if(myStudents.length === 0) {
                    studentBody.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No students found in your department.</td></tr>";
                } else {
                    studentBody.innerHTML = myStudents.map(s => `
                        <tr>
                            <td>${s.name}</td>
                            <td>${s.rollNo || 'N/A'}</td>
                            <td><input type="number" id="att-${s._id}" value="${s.attendance || 0}"></td>
                            <td><input type="number" id="st1-${s._id}" value="${s.marks?.st1 || 0}"></td>
                            <td><button class="btn-primary" style="padding: 5px 10px;" onclick="saveAcademics('${s._id}')">Save</button></td>
                        </tr>
                    `).join('');
                }

                // 2. Load Notifications & Availability
                const resT = await fetch(`${API_URL}/teachers`);
                const teachers = await resT.json();
                const me = teachers.find(t => t._id === user._id);
                
                if (me) {
                    document.getElementById("statusSelect").value = me.status || "Available";
                    personalSchedule = me.ownTimetable || [];
                    renderScheduleUI();
                    
                    const notifs = me.notifications || [];
                    document.getElementById("requestList").innerHTML = notifs.length > 0 ? 
                        notifs.slice().reverse().map(n => `
                        <div class="inbox-item" style="border-left: 5px solid ${n.status === 'pending' ? '#8b0000' : '#28a745'}; background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 10px; text-align: left;">
                            <p><strong>From:</strong> ${n.studentName}</p>
                            <p><strong>Reason:</strong> ${n.message}</p>
                            <p><strong>Status:</strong> <span style="color: ${n.status === 'Approved' ? 'green' : (n.status === 'pending' ? 'orange' : 'red')}; font-weight: bold;">${n.status.toUpperCase()}</span></p>
                            ${n.status === 'pending' ? `
                                <div style="margin-top: 10px;">
                                    <button onclick="respond('${n.studentId}', '${n.id}', 'Approved')" style="background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer;">Approve</button>
                                    <button onclick="respond('${n.studentId}', '${n.id}', 'Declined')" style="background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-left: 5px;">Decline</button>
                                </div>
                            ` : ''}
                        </div>
                    `).join('') : "<p>No meeting requests found.</p>";
                }
            } catch (err) {
                console.error("Error:", err);
                document.getElementById("requestList").innerHTML = "Failed to load data. Please refresh.";
            }
        }

        // Functions for status, schedule, academics, material same as original
        async function updateLiveStatus() {
            const newStatus = document.getElementById("statusSelect").value;
            await fetch(`${API_URL}/teacher/update-live-status`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ teacherId: user._id, status: newStatus })
            });
            alert("Status Updated!");
        }

        function addSchedule() {
            const start = document.getElementById("myStartTime").value;
            const end = document.getElementById("myEndTime").value;
            if(!start || !end) return alert("Select time!");
            personalSchedule.push({ start, end });
            renderScheduleUI();
        }

        function renderScheduleUI() {
            document.getElementById("scheduleList").innerHTML = personalSchedule.map((s, idx) => `
                <div class="schedule-chip">
                    ${s.start} - ${s.end} 
                    <span style="color:red; cursor:pointer; margin-left:5px;" onclick="personalSchedule.splice(${idx},1); renderScheduleUI();">×</span>
                </div>
            `).join('');
        }

        async function saveTimetableToDB() {
            await fetch(`${API_URL}/teacher/timetable`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ teacherId: user._id, schedule: personalSchedule })
            });
            alert("Timetable Saved!");
        }

        async function respond(sId, nId, status) {
            const res = await fetch(`${API_URL}/update-status`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ teacherId: user._id, studentId: sId, notificationId: nId, newStatus: status })
            });
            if(res.ok) { alert(`Appointment ${status}!`); loadTeacherData(); }
        }

        async function uploadMaterial(type) {
            let data = { 
                teacherName: user.name,
                subject: document.getElementById("subjectNote").value,
                link: document.getElementById("noteLink").value,
                category: 'note'
            };
            if(!data.subject || !data.link) return alert("Fill all fields!");
            await fetch(`${API_URL}/notes`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            alert("Posted!");
        }

        async function saveAcademics(sId) {
            const data = {
                studentId: sId,
                attendance: document.getElementById(`att-${sId}`).value,
                marks: { st1: document.getElementById(`st1-${sId}`).value }
            };
            await fetch(`${API_URL}/update-academics`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            alert("Data Saved!");
        }

        function logout() { localStorage.clear(); window.location.href="role.html"; }
        window.onload = loadTeacherData;
    </script>
</body>
</html>
