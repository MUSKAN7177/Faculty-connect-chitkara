<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard | Faculty Connect</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .section-box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
        input[type="number"] { width: 50px; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1000px;">
        <h2 id="teacherWelcome">Welcome, Professor</h2>
        
        <div class="section-box">
            <h3>Update Your Status</h3>
            <button onclick="updateStatus('Available')" style="background: green;">Available</button>
            <button onclick="updateStatus('Busy')" style="background: red;">Busy</button>
        </div>

        <div class="section-box">
            <h3>👨‍🎓 Student Academic Records</h3>
            <table id="studentTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Roll No</th>
                        <th>Attendance (%)</th>
                        <th>ST1</th>
                        <th>ST2</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="studentBody"></tbody>
            </table>
        </div>

        <div class="section-box">
            <h3>📚 Share Notes (Google Drive Link)</h3>
            <input type="text" id="noteSubject" placeholder="Subject Name" style="margin-bottom: 10px;">
            <input type="text" id="noteLink" placeholder="Paste Drive Link Here">
            <button onclick="uploadNote()" style="margin-top:10px;">Share Note</button>
        </div>

        <button onclick="logout()" style="background: #555;">Logout</button>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user"));
        const API_URL = "https://chitkara-faculty-app-2026.onrender.com";

        if (!user || localStorage.getItem("userRole") !== "teacher") window.location.href = "login.html";
        document.getElementById("teacherWelcome").innerText = `Welcome, Prof. ${user.name}`;

        // Load Students
        async function loadStudents() {
            const res = await fetch(`${API_URL}/students`);
            const students = await res.json();
            const body = document.getElementById("studentBody");
            body.innerHTML = "";
            students.forEach(s => {
                body.innerHTML += `
                    <tr>
                        <td>${s.name}</td>
                        <td>${s.rollNo}</td>
                        <td><input type="number" id="att-${s._id}" value="${s.attendance || 0}"></td>
                        <td><input type="number" id="st1-${s._id}" value="${s.marks?.st1 || 0}"></td>
                        <td><input type="number" id="st2-${s._id}" value="${s.marks?.st2 || 0}"></td>
                        <td><button onclick="saveAcademics('${s._id}')">Save</button></td>
                    </tr>`;
            });
        }

        async function saveAcademics(sId) {
            const data = {
                studentId: sId,
                attendance: document.getElementById(`att-${sId}`).value,
                marks: {
                    st1: document.getElementById(`st1-${sId}`).value,
                    st2: document.getElementById(`st2-${sId}`).value
                }
            };
            const res = await fetch(`${API_URL}/update-academics`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            alert("Records Updated!");
        }

        async function uploadNote() {
            const data = {
                subject: document.getElementById("noteSubject").value,
                teacherName: user.name,
                link: document.getElementById("noteLink").value
            };
            await fetch(`${API_URL}/upload-note`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            alert("Note shared with students!");
        }

        async function updateStatus(s) {
            await fetch(`${API_URL}/update-status`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ teacherId: user._id, newStatus: s })
            });
            alert("Status Updated!");
        }

        function logout() { localStorage.clear(); window.location.href = "role.html"; }
        window.onload = loadStudents;
    </script>
</body>
</html>
