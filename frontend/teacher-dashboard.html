<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard | ERP Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 1100px;">
        <h2>Welcome, Prof. <span id="tName"></span></h2>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('attendance')">📋 Attendance & Marks</button>
            <button class="tab-btn" onclick="showTab('appointments')">📩 Appointments Inbox</button>
            <button class="tab-btn" onclick="showTab('material')">📚 Notes & Timetable</button>
        </div>

        <div id="attendance" class="section-content active">
            <div class="card">
                <h3>Update Student Records</h3>
                <table>
                    <thead><tr><th>Name</th><th>Roll No</th><th>Attendance %</th><th>ST1</th><th>Action</th></tr></thead>
                    <tbody id="studentBody"></tbody>
                </table>
            </div>
        </div>

        <div id="appointments" class="section-content">
            <div class="card">
                <h3>Meeting Requests</h3>
                <div id="requestList">Loading requests...</div>
            </div>
        </div>

        <div id="material" class="section-content">
            <div class="card">
                <h3>Update Availability</h3>
                <select id="statusSelect" onchange="updateAvailability()">
                    <option value="Available">Available</option>
                    <option value="Busy">Busy (In Class)</option>
                    <option value="Away">Away</option>
                </select>
            </div>

            <div class="card" style="border-top: 4px solid #28a745;">
                <h3>📚 Upload Notes / Assignment</h3>
                <input type="text" id="subjectNote" placeholder="Subject Name (e.g. MongoDB Unit 1)">
                <input type="text" id="noteLink" placeholder="Google Drive Link">
                <button onclick="uploadMaterial('note')" style="background: #28a745;">Share Note</button>
            </div>

            <div class="card" style="border-top: 4px solid #ffcc00;">
                <h3>📅 Schedule Class (Timetable)</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="text" id="ttClass" placeholder="Class (e.g. BCA 6th Sem)" style="flex:1;">
                    <input type="time" id="ttTime" style="flex:1;">
                </div>
                <input type="text" id="ttSubject" placeholder="Subject/Topic Name">
                <button onclick="uploadMaterial('timetable')" style="background: #8b0000;">Post to Timetable</button>
            </div>
        </div>

        <button onclick="logout()" style="background: #555; margin: 20px;">Logout</button>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user"));
        const API_URL = "https://chitkara-faculty-app-2026.onrender.com";

        function showTab(tabId) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        async function uploadMaterial(type) {
            let data = {};
            if(type === 'note') {
                data = {
                    subject: document.getElementById("subjectNote").value,
                    link: document.getElementById("noteLink").value,
                    category: 'note'
                };
            } else {
                const className = document.getElementById("ttClass").value;
                const time = document.getElementById("ttTime").value;
                const sub = document.getElementById("ttSubject").value;
                data = {
                    subject: `${sub} @ ${time}`,
                    link: className, // Storing Class Name in Link field for filtering
                    category: 'timetable'
                };
            }

            if(!data.subject || !data.link) return alert("Please fill all fields!");

            await fetch(`${API_URL}/notes`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ ...data, teacherName: user.name })
            });
            alert("Uploaded successfully!");
            location.reload();
        }

        async function loadTeacherData() {
            document.getElementById("tName").innerText = user.name;
            const resS = await fetch(`${API_URL}/students`);
            const students = await resS.json();
            document.getElementById("studentBody").innerHTML = students.map(s => `
                <tr>
                    <td>${s.name}</td>
                    <td>${s.rollNo || 'N/A'}</td>
                    <td><input type="number" id="att-${s._id}" value="${s.attendance || 0}"></td>
                    <td><input type="number" id="st1-${s._id}" value="${s.marks?.st1 || 0}"></td>
                    <td><button onclick="saveAcademics('${s._id}')">Save</button></td>
                </tr>
            `).join('');

            const resT = await fetch(`${API_URL}/teachers`);
            const teachers = await resT.json();
            const me = teachers.find(t => t._id === user._id);
            document.getElementById("requestList").innerHTML = me.notifications.reverse().map(n => `
                <div class="card" style="border-left: 5px solid #8b0000;">
                    <p><strong>From:</strong> ${n.studentName}</p>
                    <p><strong>Message:</strong> ${n.message}</p>
                    ${n.status === 'pending' ? `
                        <button onclick="respond('${n.studentId}', '${n.id}', 'Approved')" style="background: green;">Approve</button>
                        <button onclick="respond('${n.studentId}', '${n.id}', 'Declined')" style="background: red;">Decline</button>
                    ` : `<span class="status-badge">${n.status}</span>`}
                </div>
            `).join('') || "No requests.";
        }

        async function saveAcademics(sId) {
            const data = {
                studentId: sId,
                attendance: document.getElementById(`att-${sId}`).value,
                marks: { st1: document.getElementById(`st1-${sId}`).value }
            };
            await fetch(`${API_URL}/update-academics`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            alert("Updated!");
        }

        function logout() { localStorage.clear(); window.location.href="role.html"; }
        window.onload = loadTeacherData;
    </script>
</body>
</html>
