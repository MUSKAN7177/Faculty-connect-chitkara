<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard | Faculty Connect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 900px;">
        <h2 id="teacherWelcome">Welcome, Professor</h2>
        <div style="display: flex; gap: 10px; margin: 20px 0;">
            <button onclick="updateStatus('Available')" style="background: #28a745;">Set Available</button>
            <button onclick="updateStatus('Busy')" style="background: #dc3545;">Set Busy</button>
        </div>
        <div class="card">
            <h3>📩 Pending Requests</h3>
            <div id="requestList"><p>Loading...</p></div>
        </div>
        <button onclick="logout()" style="margin-top: 20px; background: #555;">Logout</button>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user"));
        if (!user || localStorage.getItem("userRole") !== "teacher") {
            window.location.href = "login.html";
        }
        document.getElementById("teacherWelcome").innerText = `Welcome, Prof. ${user.name}`;

        async function updateStatus(s) {
            const res = await fetch("https://chitkara-faculty-app-2026.onrender.com/update-status", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ teacherId: user._id, newStatus: s })
            });
            const data = await res.json();
            alert(data.msg);
        }

        async function loadRequests() {
            const list = document.getElementById("requestList");
            const res = await fetch("https://chitkara-faculty-app-2026.onrender.com/teachers");
            const teachers = await res.json();
            const me = teachers.find(t => t._id === user._id);
            
            list.innerHTML = me.notifications.length ? "" : "No requests.";
            me.notifications.reverse().forEach(req => {
                list.innerHTML += `
                    <div class="card" style="margin-bottom:10px;">
                        <p><strong>${req.studentName}</strong>: ${req.message}</p>
                        ${req.status === 'pending' ? `
                        <button onclick="respond('${req.id}', '${req.studentId}', 'Accepted')" style="background:green; width:100px;">Accept</button>
                        <button onclick="respond('${req.id}', '${req.studentId}', 'Rejected')" style="background:red; width:100px;">Reject</button>
                        ` : `<span>Status: ${req.status}</span>`}
                    </div>`;
            });
        }

        async function respond(nId, sId, status) {
            await fetch("https://chitkara-faculty-app-2026.onrender.com/update-status", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ teacherId: user._id, studentId: sId, notificationId: nId, newStatus: status })
            });
            alert("Updated!");
            location.reload();
        }

        function logout() { localStorage.clear(); window.location.href = "role.html"; }
        window.onload = loadRequests;
    </script>
</body>
</html>
