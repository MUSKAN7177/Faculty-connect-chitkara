<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Dashboard | ERP Portal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: #eee; border-radius: 5px; font-weight: bold; }
        .tab-btn.active { background: #8b0000; color: white; }
        .section-content { display: none; }
        .section-content.active { display: block; }
        .status-badge { padding: 5px 10px; border-radius: 4px; font-size: 12px; }
        .pending { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1100px;">
        <h2>Welcome, Prof. <span id="tName"></span></h2>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('attendance')">📋 Attendance & Marks</button>
            <button class="tab-btn" onclick="showTab('appointments')">📩 Appointments Inbox</button>
            <button class="tab-btn" onclick="showTab('material')">📚 Notes & Timetable</button>
        </div>

        <div id="attendance" class="section-content active">
            <div class="card">
                <h3>Update Student Records</h3>
                <table>
                    <thead><tr><th>Name</th><th>Roll No</th><th>Attendance %</th><th>ST1</th><th>Action</th></tr></thead>
                    <tbody id="studentBody"></tbody>
                </table>
            </div>
        </div>

        <div id="appointments" class="section-content">
            <div class="card">
                <h3>Meeting Requests</h3>
                <div id="requestList">Loading requests...</div>
            </div>
        </div>

        <div id="material" class="section-content">
            <div class="card">
                <h3>Update Availability</h3>
                <select id="statusSelect" onchange="updateAvailability()">
                    <option value="Available">Available</option>
                    <option value="Busy">Busy (In Class)</option>
                    <option value="Away">Away</option>
                </select>
            </div>
            <div class="card">
                <h3>Upload Notes & Timetable Link</h3>
                <input type="text" id="subjectName" placeholder="Subject/Timetable Name">
                <input type="text" id="driveLink" placeholder="Google Drive Link">
                <button onclick="uploadNote()">Upload to Portal</button>
            </div>
        </div>

        <button onclick="logout()" style="background: #555;">Logout</button>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem("user"));
        const API_URL = "https://chitkara-faculty-app-2026.onrender.com";

        function showTab(tabId) {
            document.querySelectorAll('.section-content').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        async function loadTeacherData() {
            document.getElementById("tName").innerText = user.name;
            // Load Students
            const resS = await fetch(`${API_URL}/students`);
            const students = await resS.json();
            const sBody = document.getElementById("studentBody");
            sBody.innerHTML = students.map(s => `
                <tr>
                    <td>${s.name}</td>
                    <td>${s.rollNo || 'N/A'}</td>
                    <td><input type="number" id="att-${s._id}" value="${s.attendance || 0}"></td>
                    <td><input type="number" id="st1-${s._id}" value="${s.marks?.st1 || 0}"></td>
                    <td><button onclick="saveAcademics('${s._id}')">Save</button></td>
                </tr>
            `).join('');

            // Load Appointments (Notifications)
            const resT = await fetch(`${API_URL}/teachers`);
            const teachers = await resT.json();
            const me = teachers.find(t => t._id === user._id);
            const reqList = document.getElementById("requestList");
            reqList.innerHTML = me.notifications.reverse().map(n => `
                <div class="card" style="border-left: 5px solid #8b0000;">
                    <p><strong>From:</strong> ${n.studentName} (ID: ${n.studentId})</p>
                    <p><strong>Message:</strong> ${n.message}</p>
                    <p><strong>Status:</strong> <span class="status-badge pending">${n.status}</span></p>
                    ${n.status === 'pending' ? `
                        <button onclick="respond('${n.studentId}', '${n.id}', 'Approved')" style="background: green;">Approve</button>
                        <button onclick="respond('${n.studentId}', '${n.id}', 'Declined')" style="background: red;">Decline</button>
                    ` : ''}
                </div>
            `).join('') || "No new requests.";
        }

        async function respond(sId, nId, status) {
            await fetch(`${API_URL}/update-status`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ teacherId: user._id, studentId: sId, notificationId: nId, newStatus: status })
            });
            alert(`Request ${status} and Email Sent!`);
            location.reload();
        }

        async function saveAcademics(sId) {
            const data = {
                studentId: sId,
                attendance: document.getElementById(`att-${sId}`).value,
                marks: { st1: document.getElementById(`st1-${sId}`).value }
            };
            await fetch(`${API_URL}/update-academics`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });
            alert("Records Updated!");
        }

        function logout() { localStorage.clear(); window.location.href="role.html"; }
        window.onload = loadTeacherData;
    </script>
</body>
</html>
