<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Faculty Connect</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="dashboard-body">

    <nav class="sidebar">
        <div class="profile-section">
            <img src="images/student-avatar.png" id="userImg" alt="Profile">
            <h4 id="userName">User Name</h4>
            <p id="userRole">Student</p>
        </div>
        
        <div class="nav-links">
            <button onclick="loadTeachers()" class="nav-btn active"><i class="fas fa-users"></i> Faculty Connect</button>
            <button onclick="showSection('timetable')" class="nav-btn"><i class="fas fa-calendar-alt"></i> Timetable</button>
            
            <div id="studentMenu">
                <button onclick="showSection('gatepass')" class="nav-btn"><i class="fas fa-door-open"></i> Gatepass</button>
                <button onclick="showSection('medical')" class="nav-btn"><i class="fas fa-notes-medical"></i> Medical Leave</button>
            </div>

            <button onclick="loadRequests()" class="nav-btn"><i class="fas fa-bell"></i> Notifications</button>
            <button onclick="handleLogout()" class="nav-btn logout"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <h2 id="sectionTitle">Faculty Directory</h2>
            <div class="search-box">
                <input type="text" placeholder="Search Faculty..." id="searchBar">
            </div>
        </header>

        <div id="data" class="grid-container">
            </div>

        <div id="formModal" class="modal">
            </div>
    </main>

    <script src="app.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem("user"));
        const role = localStorage.getItem("userRole");

        document.getElementById("userName").innerText = user.name;
        document.getElementById("userRole").innerText = role.toUpperCase();

        if(role === "teacher") {
            document.getElementById("studentMenu").style.display = "none";
        }

        // 1. Load Teachers with Clean Grid Cards
        async function loadTeachers() {
            document.getElementById("sectionTitle").innerText = "Faculty Directory";
            const res = await fetch("https://chitkara-faculty-app-2026.onrender.com/teachers");
            const teachers = await res.json();

            let html = "";
            teachers.forEach(t => {
                const isAvailable = t.status === "Available";
                html += `
                <div class="faculty-card">
                    <div class="card-header">
                        <img src="images/teacher.jpg" alt="Teacher">
                        <span class="status-badge ${isAvailable ? 'online' : 'offline'}">
                            ${isAvailable ? 'Available' : 'Busy'}
                        </span>
                    </div>
                    <h3>${t.name}</h3>
                    <p>${t.department}</p>
                    
                    <div class="card-actions">
                        <button onclick="viewTT('${t._id}')" class="btn-outline">View Timetable</button>
                        ${role === "student" ? `<button onclick="sendReq('${t._id}', '${t.name}')" class="btn-primary">Book Meeting</button>` : ""}
                    </div>
                </div>
                `;
            });
            document.getElementById("data").innerHTML = html;
        }

        // 2. Show Forms for Gatepass/Medical (Chalkpad Style)
        function showSection(type) {
            const container = document.getElementById("data");
            if(type === 'gatepass') {
                container.innerHTML = `
                    <div class="form-card card">
                        <h3>Request Gatepass</h3>
                        <form onsubmit="requestGatepass(event)">
                            <label>Reason for Leave</label>
                            <input type="text" id="gpReason" placeholder="Personal / Hospital" required>
                            <label>Out Time</label>
                            <input type="time" id="gpTime" required>
                            <button type="submit" class="btn-primary">Apply for Gatepass</button>
                        </form>
                    </div>
                `;
            } else if(type === 'medical') {
                container.innerHTML = `
                    <div class="form-card card">
                        <h3>Apply for Medical Leave</h3>
                        <form onsubmit="requestMedicalLeave(event)">
                            <label>Nature of Illness</label>
                            <input type="text" id="illness" placeholder="Fever / Injury" required>
                            <label>Duration (Days)</label>
                            <input type="number" id="duration" required>
                            <label>Medical Certificate Link (Drive)</label>
                            <input type="text" id="docLink" placeholder="Paste link here" required>
                            <button type="submit" class="btn-primary">Submit Leave</button>
                        </form>
                    </div>
                `;
            }
        }

        // Initialize
        loadTeachers();
    </script>
</body>
</html>
